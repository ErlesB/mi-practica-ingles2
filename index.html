<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily English Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        font-family: 'Inter', system-ui, sans-serif;
        color: #0f172a;
        background: #f8fafc;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
      }

      .app-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      main {
        width: 100%;
        max-width: 40rem;
        padding: 2rem;
        border-radius: 1rem;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 2.5rem;
      }

      p {
        margin: 0 0 1.5rem;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 0.85rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const root = document.getElementById('root');
      let name = 'Learner';

      function render() {
        root.innerHTML = `
          <div class="app-container">
            <main>
              <h1>Daily English Practice</h1>
              <p id="greeting">Welcome, ${name}! Use this app to practice English every day.</p>
              <label>
                Your name:
                <input id="nameInput" type="text" value="${name}" placeholder="Type your name" />
              </label>
            </main>
          </div>
        `;

        const input = document.getElementById('nameInput');
        input.addEventListener('input', (event) => {
          name = event.target.value || 'Learner';
          document.getElementById('greeting').textContent =
            `Welcome, ${name}! Use this app to practice English every day.`;
        });
      }

      render();
    </script>
  </body>
</html>
